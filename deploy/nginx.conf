# nginx config for the Sentire BIR Form Generator SPA.
# Replaces vercel.json's rewrite: every non-file route falls back to
# index.html so React Router handles it client-side.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Runtime config + index.html must never be cached (env changes and new
    # deploys have to take effect immediately).
    location = /env.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA fallback for React Router paths (/taxpayers, /1701A/2024/..., etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
