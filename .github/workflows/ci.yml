name: CI

# Quality gate: typecheck, build, and run the compute test-suite.
# Runs on pushes to main and feature branches (so the status check is attached
# to the head commit) and on PRs into main.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
