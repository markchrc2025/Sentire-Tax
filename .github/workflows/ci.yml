name: CI

# Quality gate: typecheck, build, and run the compute test-suite.
#
# Triggered on PUSH to main and feature branches so the `build-test` status
# check is attached to every head commit (this is the check required by branch
# protection). We intentionally do NOT use a `pull_request` trigger: PRs opened
# by the Auto-PR workflow's GITHUB_TOKEN create a run stuck in "action_required"
# (needs manual approval), which would block squash auto-merge on every PR.
on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
